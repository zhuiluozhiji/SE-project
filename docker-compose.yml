services:
  mysql:
    image: mysql:8.0
    container_name: se-project-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: se_project
      MYSQL_USER: se_user
      MYSQL_PASSWORD: se_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./database/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql:ro
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci

  backend:
    build:
      context: ./backend
    container_name: se-project-backend
    env_file:
      - .env.example
    environment:
      DATABASE_URL: mysql+pymysql://se_user:se_password@mysql:3306/se_project
    ports:
      - "8000:8000"
    depends_on:
      - mysql

  frontend:
    build:
      context: ./frontend
    container_name: se-project-frontend
    environment:
      VITE_API_BASE_URL: http://localhost:8000/api/v1
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  mysql_data:
